<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Delivery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>QuickBite</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Menu</a>
      <a href="#">Cart</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Delicious Food, Delivered Fast</h2>
      <p>Order your favorite meals from top restaurants in your city.</p>
      <button onclick="orderNow()">Order Now</button>
    </section>

    <section class="menu">
      <h2>Menu</h2>
      <div class="menu-items">
        <div class="item">
          <img src="https://via.placeholder.com/150" alt="Burger" />
          <h3>Burger</h3>
          <p>$5.99</p>
          <button>Add to Cart</button>
        </div>
        <div class="item">
          <img src="https://via.placeholder.com/150" alt="Pizza" />
          <h3>Pizza</h3>
          <p>$8.99</p>
          <button>Add to Cart</button>
        </div>
        <!-- Add more items as needed -->
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 QuickBite. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
